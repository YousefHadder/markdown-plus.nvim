updates:
- commit-message:
    include: scope
    prefix: chore
  directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  - github-actions
  package-ecosystem: github-actions
  schedule:
    interval: weekly
version: 2
